name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: rust checks
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: test
        run: cargo test --locked

      - name: clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: fmt
        run: cargo fmt --all --check

      - name: validate eval fixtures
        run: cargo run --locked -- eval validate
