name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  quality:
    name: quality gates
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: test
        run: cargo test --locked

      - name: clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: fmt
        run: cargo fmt --all --check

      - name: validate eval fixtures
        run: cargo run --locked -- eval validate

  build:
    name: build ${{ matrix.name }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: install linux musl linker
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: install rust target
        run: rustup target add ${{ matrix.target }}

      - name: build release binary
        run: cargo build --locked --release --bin loka --target ${{ matrix.target }}
        env:
          CC_aarch64_unknown_linux_musl: musl-gcc
          CC_x86_64_unknown_linux_musl: musl-gcc

      - name: smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            target/${{ matrix.target }}/release/loka.exe health
          else
            target/${{ matrix.target }}/release/loka health
          fi

      - name: package unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          archive="loka-${target}.tar.gz"

          strip "target/${target}/release/loka" || true
          rm -rf dist
          mkdir -p dist/loka
          cp "target/${target}/release/loka" dist/loka/
          cp README.md dist/loka/
          tar -C dist -czf "dist/${archive}" loka

          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          else
            (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          fi

      - name: package windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $target = "${{ matrix.target }}"
          $archive = "loka-$target.zip"

          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist/loka | Out-Null
          Copy-Item "target/$target/release/loka.exe" dist/loka/
          Copy-Item README.md dist/loka/
          Compress-Archive -Path dist/loka -DestinationPath "dist/$archive" -Force

          $hash = (Get-FileHash -Algorithm SHA256 "dist/$archive").Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii "dist/$archive.sha256"

      - name: upload packaged binary
        uses: actions/upload-artifact@v7
        with:
          name: loka-${{ matrix.name }}
          path: dist/loka-*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: download packaged binaries
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --verify-tag \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi

          find dist -type f -name 'loka-*' -print0 \
            | xargs -0 gh release upload "${RELEASE_TAG}" --clobber
